<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1080" width="1080" height="1080" font-family="-apple-system, 'Poppins', 'Inter', sans-serif">
  <!-- Background -->
  <defs>
    <radialGradient id="bgGlow" cx="50%" cy="10%" r="70%">
      <stop offset="0%" stop-color="#75e9d2" stop-opacity="0.10"/>
      <stop offset="60%" stop-color="#75e9d2" stop-opacity="0.00"/>
    </radialGradient>
    <linearGradient id="cardGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#111119"/>
      <stop offset="100%" stop-color="#0d0d14"/>
    </linearGradient>
  </defs>
  <rect width="1080" height="1080" fill="#08080d"/>
  <rect width="1080" height="1080" fill="url(#bgGlow)"/>

  <!-- Top label -->
  <text x="540" y="96" text-anchor="middle" fill="#75e9d2" font-size="20" font-weight="600" letter-spacing="4" font-family="'Poppins', sans-serif">FREE FOR FOUNDER-LED DTC BRANDS</text>

  <!-- Title -->
  <text x="540" y="170" text-anchor="middle" fill="#ffffff" font-size="78" font-weight="800" font-family="'Montserrat', sans-serif" letter-spacing="-2">AI SEO + AEO Audit</text>

  <!-- Subtitle -->
  <text x="540" y="220" text-anchor="middle" fill="#9494ad" font-size="24" font-weight="400">Eight pillars. Cross-cutting synthesis. Delivered in 30 minutes.</text>

  <!-- 10 cards: 2 cols × 5 rows -->
  <!-- Card dimensions: w=480 h=112, gap=20, start y=270, col1 x=40, col2 x=560 -->
  <!-- Row starts: 270, 396, 522, 648, 774 -->

  <g font-family="'Poppins', sans-serif">
    <!-- 01 Crawl & Indexation -->
    <g transform="translate(40 270)">
      <rect width="480" height="112" rx="14" fill="url(#cardGrad)" stroke="#1a1a24" stroke-width="1"/>
      <text x="24" y="40" fill="#75e9d2" font-size="14" font-weight="700" letter-spacing="3">01 · CRAWL &amp; INDEXATION</text>
      <text x="24" y="74" fill="#ffffff" font-size="22" font-weight="600">Indexation coverage + AI-bot access</text>
      <text x="24" y="98" fill="#9494ad" font-size="15">GSC coverage · robots.txt · sitemap · orphan pages · redirects</text>
    </g>

    <!-- 02 Technical Foundations -->
    <g transform="translate(560 270)">
      <rect width="480" height="112" rx="14" fill="url(#cardGrad)" stroke="#1a1a24" stroke-width="1"/>
      <text x="24" y="40" fill="#75e9d2" font-size="14" font-weight="700" letter-spacing="3">02 · TECHNICAL FOUNDATIONS</text>
      <text x="24" y="74" fill="#ffffff" font-size="22" font-weight="600">Core Web Vitals + schema coverage</text>
      <text x="24" y="98" fill="#9494ad" font-size="15">LCP, INP, CLS · schema matrix · internal links · mobile UX</text>
    </g>

    <!-- 03 On-Page -->
    <g transform="translate(40 396)">
      <rect width="480" height="112" rx="14" fill="url(#cardGrad)" stroke="#1a1a24" stroke-width="1"/>
      <text x="24" y="40" fill="#75e9d2" font-size="14" font-weight="700" letter-spacing="3">03 · ON-PAGE</text>
      <text x="24" y="74" fill="#ffffff" font-size="22" font-weight="600">Title, meta, and heading fixes</text>
      <text x="24" y="98" fill="#9494ad" font-size="15">Cannibalisation · duplicates · alt text · keyword targeting</text>
    </g>

    <!-- 04 Content Quality -->
    <g transform="translate(560 396)">
      <rect width="480" height="112" rx="14" fill="url(#cardGrad)" stroke="#1a1a24" stroke-width="1"/>
      <text x="24" y="40" fill="#75e9d2" font-size="14" font-weight="700" letter-spacing="3">04 · CONTENT QUALITY</text>
      <text x="24" y="74" fill="#ffffff" font-size="22" font-weight="600">Topical authority heat map</text>
      <text x="24" y="98" fill="#9494ad" font-size="15">E-E-A-T · depth · freshness · cluster maturity · merge list</text>
    </g>

    <!-- 05 Keyword Footprint -->
    <g transform="translate(40 522)">
      <rect width="480" height="112" rx="14" fill="url(#cardGrad)" stroke="#1a1a24" stroke-width="1"/>
      <text x="24" y="40" fill="#75e9d2" font-size="14" font-weight="700" letter-spacing="3">05 · KEYWORD FOOTPRINT</text>
      <text x="24" y="74" fill="#ffffff" font-size="22" font-weight="600">Gap + striking-distance map</text>
      <text x="24" y="98" fill="#9494ad" font-size="15">GSC queries · competitor gap · positions 4-15 · low-CTR fixes</text>
    </g>

    <!-- 06 AI Search (AEO) -->
    <g transform="translate(560 522)">
      <rect width="480" height="112" rx="14" fill="url(#cardGrad)" stroke="#1a1a24" stroke-width="1"/>
      <text x="24" y="40" fill="#75e9d2" font-size="14" font-weight="700" letter-spacing="3">06 · AI SEARCH (AEO)</text>
      <text x="24" y="74" fill="#ffffff" font-size="22" font-weight="600">AI citation presence + whitespace</text>
      <text x="24" y="98" fill="#9494ad" font-size="15">ChatGPT, Claude, Perplexity, AI Overview · extractability</text>
    </g>

    <!-- 07 Backlinks -->
    <g transform="translate(40 648)">
      <rect width="480" height="112" rx="14" fill="url(#cardGrad)" stroke="#1a1a24" stroke-width="1"/>
      <text x="24" y="40" fill="#75e9d2" font-size="14" font-weight="700" letter-spacing="3">07 · BACKLINKS</text>
      <text x="24" y="74" fill="#ffffff" font-size="22" font-weight="600">Authority signal + reclaim targets</text>
      <text x="24" y="98" fill="#9494ad" font-size="15">DR · referring domains · unlinked mentions · 10-tier target list</text>
    </g>

    <!-- 08 Ecommerce & Local -->
    <g transform="translate(560 648)">
      <rect width="480" height="112" rx="14" fill="url(#cardGrad)" stroke="#1a1a24" stroke-width="1"/>
      <text x="24" y="40" fill="#75e9d2" font-size="14" font-weight="700" letter-spacing="3">08 · ECOMMERCE &amp; LOCAL</text>
      <text x="24" y="74" fill="#ffffff" font-size="22" font-weight="600">Product schema + catalog hygiene</text>
      <text x="24" y="98" fill="#9494ad" font-size="15">Rich results · Merchant Center · collections · GBP · NAP</text>
    </g>

    <!-- 09 Ranked Action List -->
    <g transform="translate(40 774)">
      <rect width="480" height="112" rx="14" fill="url(#cardGrad)" stroke="#1a1a24" stroke-width="1"/>
      <text x="24" y="40" fill="#75e9d2" font-size="14" font-weight="700" letter-spacing="3">09 · RANKED ACTION LIST</text>
      <text x="24" y="74" fill="#ffffff" font-size="22" font-weight="600">Top fixes to ship this week</text>
      <text x="24" y="98" fill="#9494ad" font-size="15">Every finding ICE-scored · 30-60-90 plan · biggest organic lever</text>
    </g>

    <!-- 10 Cross-cutting Synthesis -->
    <g transform="translate(560 774)">
      <rect width="480" height="112" rx="14" fill="#75e9d2" stroke="#75e9d2" stroke-width="1"/>
      <text x="24" y="40" fill="#08080d" font-size="14" font-weight="700" letter-spacing="3">10 · CROSS-CUTTING SYNTHESIS</text>
      <text x="24" y="74" fill="#08080d" font-size="22" font-weight="700">Correlated insights + highest-leverage moves</text>
      <text x="24" y="98" fill="#08080d" font-size="15" opacity="0.80">Patterns across technical, on-page, content, AEO · top 5 by ICE</text>
    </g>
  </g>

  <!-- Bottom bar: URL + CTA -->
  <g transform="translate(0 924)">
    <line x1="40" y1="0" x2="1040" y2="0" stroke="#1a1a24" stroke-width="1"/>
    <text x="40" y="54" fill="#9494ad" font-size="20" font-weight="500">Delivered as one Word doc + markdown source in your GitHub repo.</text>
    <text x="40" y="104" fill="#ffffff" font-size="36" font-weight="700" font-family="'Montserrat', sans-serif" letter-spacing="-0.5">entir<tspan fill="#75e9d2">ecommerce.ai</tspan><tspan fill="#9494ad">/playbooks/seo-audit</tspan></text>
  </g>
</svg>
